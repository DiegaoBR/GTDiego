<section class="py-24 px-6 bg-slate-900 border-y border-slate-800">
    <div class="max-w-4xl mx-auto">
        <div class="text-center mb-12">
            <h2 class="text-3xl font-bold text-white mb-4">Simulador de Viabilidade</h2>
            <p class="text-slate-400">Descubra quanto você realmente ganha com cada cliente que eu trago.</p>
        </div>

        <div class="grid md:grid-cols-2 gap-12 bg-slate-950 p-8 rounded-3xl border border-emerald-900/30">
            <div class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-2">Investimento em Anúncios (R$)</label>
                    <input type="number" id="invest" value="1000" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-white focus:ring-2 focus:ring-emerald-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-2">Vendas Geradas (Qtd)</label>
                    <input type="number" id="sales" value="20" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-white focus:ring-2 focus:ring-emerald-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-2">Ticket Médio (Venda Única)</label>
                    <input type="number" id="ticket" value="150" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-white focus:ring-2 focus:ring-emerald-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-2">Quantas vezes ele compra por ano?</label>
                    <input type="number" id="freq" value="3" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-white focus:ring-2 focus:ring-emerald-500 outline-none">
                </div>
            </div>

            <div class="flex flex-col justify-center bg-emerald-950/20 p-8 rounded-2xl border border-emerald-500/20">
                <div class="mb-6">
                    <p class="text-slate-400 text-sm uppercase tracking-wider">Seu custo para adquirir 1 cliente (CAC):</p>
                    <p class="text-3xl font-black text-white">R$ <span id="cac-val">50,00</span></p>
                </div>
                <div>
                    <p class="text-emerald-400 text-sm uppercase tracking-wider font-bold">Valor Real do Cliente (LTV):</p>
                    <p class="text-5xl font-black text-emerald-500">R$ <span id="ltv-val">450,00</span></p>
                    <p class="text-slate-500 text-xs mt-2">*Este é o lucro potencial que você ignora hoje.</p>
                </div>
            </div>
        </div>
    </div>
</section>

<script>
    function calculate() {
        const invest = parseFloat(document.getElementById('invest').value) || 0;
        const sales = parseFloat(document.getElementById('sales').value) || 1;
        const ticket = parseFloat(document.getElementById('ticket').value) || 0;
        const freq = parseFloat(document.getElementById('freq').value) || 1;

        const cac = invest / sales;
        const ltv = ticket * freq;

        document.getElementById('cac-val').innerText = cac.toFixed(2);
        document.getElementById('ltv-val').innerText = ltv.toFixed(2);
    }

    document.querySelectorAll('input').forEach(input => {
        input.addEventListener('input', calculate);
    });
    calculate();
</script>
